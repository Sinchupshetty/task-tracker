{% extends "base.html" %}
{% block title %}Login — Task Tracker{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Welcome back</h1>
      <p>Sign in to your workspace</p>
    </div>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter username" autocomplete="username" required/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter password" autocomplete="current-password" required/>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign in</button>
    </form>

    <div class="auth-footer">
      <p>No account? <a href="{{ url_for('register') }}">Create one</a></p>
      <p class="demo-hint">Demo login: <strong>demo</strong> / <strong>demo123</strong></p>
    </div>
  </div>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Edit Task — Task Tracker{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card edit-card">
    <div class="auth-header">
      <h1>Edit task</h1>
      <p>Update the task details below</p>
    </div>

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="title">Task title *</label>
        <input type="text" id="title" name="title" value="{{ task.title }}" required/>
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <input type="text" id="description" name="description" value="{{ task.description or '' }}" placeholder="Optional details..."/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="priority">Priority</label>
          <select id="priority" name="priority">
            <option value="high" {% if task.priority == 'high' %}selected{% endif %}>🔴 High</option>
            <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>🟡 Medium</option>
            <option value="low" {% if task.priority == 'low' %}selected{% endif %}>🟢 Low</option>
          </select>
        </div>
        <div class="form-group">
          <label for="due_date">Due date</label>
          <input type="date" id="due_date" name="due_date" value="{{ task.due_date or '' }}"/>
        </div>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="{{ url_for('tasks') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
